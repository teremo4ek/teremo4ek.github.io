{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title }},
  "description": {{ .Params.description | default .Summary }},
  "image": {{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "images/og-image.png" | absURL }}{{ end }},
  "author": {
    "@type": "Person",
    "name": {{ site.Params.metadata.author }}
  },
  "publisher": {
    "@type": "Person",
    "name": {{ site.Params.metadata.author }}
  },
  "datePublished": {{ .PublishDate.Format "2006-01-02T15:04:05Z" }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z" }},
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink }}
  }
  {{ with .Params.tags }},
  "keywords": {{ . }}
  {{ end }}
}
</script>
{{ end }}
